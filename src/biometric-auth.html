<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReDD 2FA — Touch ID</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #1a1a2e;
            color: #e0e0e0;
        }

        .container {
            text-align: center;
            max-width: 380px;
            padding: 40px 30px;
            background: #16213e;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        h1 {
            font-size: 20px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        p {
            font-size: 14px;
            color: #999;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .status {
            font-size: 14px;
            color: #7ec8e3;
            margin-top: 16px;
        }

        .error {
            color: #e74c3c;
        }

        .success {
            color: #2ecc71;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="icon">🔐</div>
        <h1 id="title">Touch ID</h1>
        <p id="message">Waiting for biometric verification…</p>
        <div id="status" class="status"></div>
    </div>
    <script type="module" src="biometric-auth.js"></script>
</body>

</html>
